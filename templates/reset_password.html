<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FastShip</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght=200..800&family=Sedgwick+Ave+Display&display=swap');

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f2f2f2;
            font-family: "Manrope";
        }

        .row {
            display: flex;
        }

        .container {
            --padding: 30px;
            position: relative;
            width: 90vw;
            max-width: 560px;
            margin: 40px auto;
            padding: var(--padding);
            border-radius: 20px;
            border: 1px solid #ccc;
            background-color: white;
        }
        
        form {
            font-family: "Manrope";
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .password-wrapper input {
            width: 100%;
            padding-right: 45px; /* Leave space for the toggle icon */
        }

        input {
            padding: .5em .75em;
            font-size: 18px;
            border-radius: .45em;
            background-color: #f2f2f2;
            border: 1px solid #ccc;
            font-family: inherit;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            outline: none;
        }

        .toggle-password svg {
            width: 22px;
            height: 22px;
        }

        input[type=submit] {
            color: white;
            background-color: black;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        
        input[type=submit]:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Reset Password</h1>

        <form action="{{ reset_url }}" method="post">
            <div class="password-wrapper">
                <input type="password" id="password" name="password" placeholder="Enter a new password" required>
                <button type="button" id="togglePassword" class="toggle-password" aria-label="Toggle password visibility">
                    <!-- Eye Open SVG -->
                    <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                    <!-- Eye Closed SVG -->
                    <svg id="eyeClosed" style="display: none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                    </svg>
                </button>
            </div>
            <input type="submit" value="Reset">
        </form>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        const eyeOpen = document.querySelector('#eyeOpen');
        const eyeClosed = document.querySelector('#eyeClosed');

        togglePassword.addEventListener('click', function () {
            // Toggle the type attribute
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle the eye SVGs
            if (type === 'password') {
                eyeOpen.style.display = 'block';
                eyeClosed.style.display = 'none';
            } else {
                eyeOpen.style.display = 'none';
                eyeClosed.style.display = 'block';
            }
        });
    </script>
</body>

</html>
